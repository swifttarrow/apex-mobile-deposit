version: "3.9"

services:
  checkstream:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=/data/checkstream.db
    volumes:
      - checkstream-data:/data
      - checkstream-settlements:/app/settlements
    restart: unless-stopped

volumes:
  checkstream-data:
  checkstream-settlements:
