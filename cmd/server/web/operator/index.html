<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkstream — Operator Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --fail: #f85149;
      --warn: #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

    /* Nav */
    nav { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 0; }
    .nav-brand { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; padding: 0.9rem 0; margin-right: 2rem; }
    .nav-link { padding: 0.9rem 1rem; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

    .api-bar { display: flex; align-items: center; gap: 1rem; padding: 0.5rem 1.5rem; background: var(--bg); border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .api-bar label { color: var(--text-muted); }
    .api-bar input { flex: 1; max-width: 320px; padding: 0.4rem 0.6rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; }
    .api-bar .status { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .api-bar .status.ok { background: rgba(63,185,80,.2); color: var(--success); }
    .api-bar .status.err { background: rgba(248,81,73,.2); color: var(--fail); }
    .api-bar .status.pending { color: var(--text-muted); }

    .main { display: flex; height: calc(100vh - 96px); overflow: hidden; }

    /* Queue panel */
    .queue-panel { flex: 0 0 380px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); overflow: hidden; }
    .queue-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .queue-header h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .queue-header .filters { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .queue-header .filters input { padding: 0.3rem 0.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 0.8rem; width: 120px; }
    .queue-header .filters button { padding: 0.3rem 0.75rem; background: var(--accent); color: var(--bg); border: none; border-radius: 5px; font-size: 0.8rem; cursor: pointer; font-weight: 600; }
    .queue-list { flex: 1; overflow-y: auto; padding: 0.75rem; }
    .queue-empty { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem; }
    .queue-error { padding: 1rem; color: var(--fail); font-size: 0.85rem; }
    .queue-loading { padding: 1rem; color: var(--text-muted); font-size: 0.85rem; }

    .queue-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.5rem; padding: 0.9rem 1rem; cursor: pointer; transition: border-color 0.15s; }
    .queue-card:hover { border-color: var(--accent); }
    .queue-card.selected { border-color: var(--accent); background: var(--bg-hover); }
    .queue-card-id { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.3rem; }
    .queue-card-account { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .queue-card-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .badge { font-size: 0.7rem; padding: 0.15rem 0.4rem; border-radius: 4px; }
    .badge-amount { background: rgba(88,166,255,.15); color: var(--accent); }
    .badge-warn { background: rgba(210,153,34,.15); color: var(--warn); }
    .badge-muted { background: var(--bg-hover); color: var(--text-muted); }

    /* Detail panel */
    .detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .detail-placeholder { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-muted); font-size: 0.9rem; }
    .detail-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .detail-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: flex-start; gap: 1rem; }
    .detail-header-info { flex: 1; }
    .detail-header h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
    .detail-header .detail-id { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }
    .detail-body { flex: 1; overflow-y: auto; padding: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-content: start; }

    .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .info-card h3 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.75rem; }
    .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; font-size: 0.85rem; }
    .info-row .label { color: var(--text-muted); }
    .info-row .val { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .info-row .val.mismatch { color: var(--fail); font-weight: 600; }
    .info-row .val.match { color: var(--success); }
    .micr-bar { height: 6px; border-radius: 3px; background: var(--bg-hover); margin-top: 0.5rem; overflow: hidden; }
    .micr-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

    .images-card { grid-column: 1 / -1; }
    .images-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
    .check-thumb { background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; text-align: center; min-width: 140px; }
    .check-thumb p { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem; }
    .check-thumb img { max-width: 160px; max-height: 100px; border-radius: 4px; display: block; }
    .check-thumb .no-img { width: 160px; height: 80px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.75rem; background: var(--bg); border-radius: 4px; }

    .actions-card { grid-column: 1 / -1; }
    .actions-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 0; }
    .override-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .override-group label { font-size: 0.8rem; color: var(--text-muted); }
    .override-group select { padding: 0.4rem 0.6rem; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; }
    .btn { padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-approve { background: var(--success); color: #0d1117; }
    .btn-reject { background: var(--fail); color: #fff; }
    .action-feedback { margin-top: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.85rem; display: none; }
    .action-feedback.ok { background: rgba(63,185,80,.15); color: var(--success); display: block; }
    .action-feedback.err { background: rgba(248,81,73,.15); color: var(--fail); display: block; }

    .audit-card { grid-column: 1 / -1; }
    .audit-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .audit-item { background: var(--bg-hover); border-radius: 6px; padding: 0.6rem 0.8rem; display: flex; align-items: baseline; gap: 0.75rem; font-size: 0.82rem; }
    .audit-action { font-weight: 600; text-transform: capitalize; }
    .audit-action.approve { color: var(--success); }
    .audit-action.reject { color: var(--fail); }
    .audit-meta { color: var(--text-muted); font-size: 0.77rem; font-family: 'JetBrains Mono', monospace; }
    .audit-empty { color: var(--text-muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">Checkstream</span>
    <a href="/scenarios" class="nav-link">Scenarios</a>
    <a href="/operator" class="nav-link active">Operator</a>
    <a href="/mobile" class="nav-link">Mobile</a>
  </nav>
  <div class="api-bar">
    <label for="apiBase">API:</label>
    <input type="text" id="apiBase" placeholder="http://localhost:8080">
    <span id="apiStatus" class="status pending">—</span>
  </div>

  <div class="main">
    <!-- Queue panel -->
    <div class="queue-panel">
      <div class="queue-header">
        <h2>Flagged Queue</h2>
        <div class="filters">
          <input type="text" id="filterDate" placeholder="Date (YYYY-MM-DD)">
          <input type="text" id="filterAccount" placeholder="Account ID">
          <button id="refreshBtn">Refresh</button>
        </div>
      </div>
      <div class="queue-list" id="queueList">
        <p class="queue-loading">Loading…</p>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-placeholder" id="detailPlaceholder">
        Select a flagged deposit to review
      </div>
      <div class="detail-content" id="detailContent" style="display:none">
        <div class="detail-header">
          <div class="detail-header-info">
            <h2 id="detailAccount">Account</h2>
            <div class="detail-id" id="detailId"></div>
          </div>
        </div>
        <div class="detail-body">
          <!-- Amounts & Risk -->
          <div class="info-card">
            <h3>Amounts</h3>
            <div class="info-row"><span class="label">Entered</span><span class="val" id="dEntered">—</span></div>
            <div class="info-row"><span class="label">OCR Read</span><span class="val" id="dOCR">—</span></div>
            <div class="info-row"><span class="label">Match</span><span class="val" id="dAmountMatch">—</span></div>
          </div>
          <!-- Scores -->
          <div class="info-card">
            <h3>Risk Scores</h3>
            <div class="info-row"><span class="label">IQ Score</span><span class="val" id="dIQ">—</span></div>
            <div class="info-row"><span class="label">MICR Confidence</span><span class="val" id="dMICR">—</span></div>
            <div style="margin-top:0.5rem">
              <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.3rem">MICR Confidence</div>
              <div class="micr-bar"><div class="micr-bar-fill" id="micrBarFill" style="width:0%;background:var(--warn)"></div></div>
            </div>
          </div>
          <!-- Images -->
          <div class="info-card images-card">
            <h3>Check Images</h3>
            <div class="images-grid" id="imagesGrid"></div>
          </div>
          <!-- Actions -->
          <div class="info-card actions-card">
            <h3>Review Actions</h3>
            <div class="actions-row">
              <div class="override-group">
                <label for="contributionOverride">Contribution Type Override</label>
                <select id="contributionOverride">
                  <option value="">(use default)</option>
                  <option value="checking">Checking</option>
                  <option value="savings">Savings</option>
                  <option value="money_market">Money Market</option>
                </select>
              </div>
              <button class="btn btn-approve" id="approveBtn">Approve</button>
              <button class="btn btn-reject" id="rejectBtn">Reject</button>
            </div>
            <div class="action-feedback" id="actionFeedback"></div>
          </div>
          <!-- Audit -->
          <div class="info-card audit-card">
            <h3>Audit History</h3>
            <div class="audit-list" id="auditList"><p class="audit-empty">No actions yet</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function apiBase() {
      return ($('apiBase').value || '').trim() || (location.origin.includes('localhost') ? 'http://localhost:8080' : location.origin);
    }

    function fmt(n) { return typeof n === 'number' ? '$' + n.toFixed(2) : n || '—'; }
    function fmtPct(n) { return typeof n === 'number' ? (n * 100).toFixed(1) + '%' : '—'; }

    let selectedTransfer = null;
    let queueItems = [];
    const POLL_INTERVAL_MS = 5000;
    let pollTimer = null;

    async function loadQueue(silent = false) {
      const list = $('queueList');
      if (!silent) list.innerHTML = '<p class="queue-loading">Loading…</p>';
      const base = apiBase();
      let url = `${base}/operator/queue`;
      const date = $('filterDate').value.trim();
      const acct = $('filterAccount').value.trim();
      const params = new URLSearchParams();
      if (date) params.set('date', date);
      if (acct) params.set('account', acct);
      if ([...params].length) url += '?' + params.toString();
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        queueItems = data.transfers || [];
        renderQueue();
        await checkAPIStatus();
      } catch(e) {
        list.innerHTML = `<p class="queue-error">Error: ${e.message}</p>`;
      }
    }

    function renderQueue() {
      const list = $('queueList');
      if (!queueItems.length) { list.innerHTML = '<p class="queue-empty">No flagged deposits</p>'; return; }
      list.innerHTML = queueItems.map(t => {
        const micr = typeof t.micr_confidence === 'number' ? t.micr_confidence : (t.MICRConfidence || 0);
        const iq = typeof t.iq_score === 'number' ? t.iq_score : (t.IQScore || 0);
        const mismatch = t.ocr_amount && t.entered_amount && Math.abs(t.ocr_amount - t.entered_amount) > 0.01;
        return `<div class="queue-card${selectedTransfer?.id === t.id ? ' selected' : ''}" data-id="${t.id}">
          <div class="queue-card-id">${t.id}</div>
          <div class="queue-card-account">${t.account_id}</div>
          <div class="queue-card-meta">
            <span class="badge badge-amount">${fmt(t.amount)}</span>
            ${micr < 0.7 ? `<span class="badge badge-warn">MICR ${fmtPct(micr)}</span>` : `<span class="badge badge-muted">MICR ${fmtPct(micr)}</span>`}
            ${mismatch ? `<span class="badge badge-warn">Amount mismatch</span>` : ''}
            ${iq > 0 ? `<span class="badge badge-muted">IQ ${fmtPct(iq)}</span>` : ''}
          </div>
        </div>`;
      }).join('');
      list.querySelectorAll('.queue-card').forEach(card => {
        card.onclick = () => {
          const t = queueItems.find(x => x.id === card.dataset.id);
          if (t) selectTransfer(t);
        };
      });
    }

    function selectTransfer(t) {
      selectedTransfer = t;
      renderQueue();
      $('detailPlaceholder').style.display = 'none';
      $('detailContent').style.display = 'flex';
      $('detailAccount').textContent = t.account_id;
      $('detailId').textContent = t.id;

      const entered = t.entered_amount || t.amount;
      const ocr = t.ocr_amount;
      $('dEntered').textContent = fmt(entered);
      $('dOCR').textContent = ocr ? fmt(ocr) : '(not read)';
      const mismatch = ocr && Math.abs(ocr - entered) > 0.01;
      const matchEl = $('dAmountMatch');
      matchEl.textContent = ocr ? (mismatch ? 'Mismatch' : 'Match') : '—';
      matchEl.className = 'val' + (ocr ? (mismatch ? ' mismatch' : ' match') : '');

      const iq = t.iq_score || t.IQScore || 0;
      const micr = t.micr_confidence || t.MICRConfidence || 0;
      $('dIQ').textContent = iq ? fmtPct(iq) : '—';
      $('dMICR').textContent = micr ? fmtPct(micr) : '—';

      const fill = $('micrBarFill');
      fill.style.width = micr ? (micr * 100).toFixed(0) + '%' : '0%';
      fill.style.background = micr > 0.8 ? 'var(--success)' : micr > 0.5 ? 'var(--warn)' : 'var(--fail)';

      // Images
      const grid = $('imagesGrid');
      const front = t.front_image_path;
      const back = t.back_image_path;
      grid.innerHTML = [['Front', front], ['Back', back]].map(([label, path]) => {
        const imgHtml = path
          ? `<img src="${apiBase()}/checks/${encodeURIComponent(path)}" onerror="this.outerHTML='<div class=\\'no-img\\'>Image unavailable</div>'">`
          : `<div class="no-img">No image</div>`;
        return `<div class="check-thumb">${imgHtml}<p>${label}</p></div>`;
      }).join('');

      $('actionFeedback').className = 'action-feedback';
      $('actionFeedback').textContent = '';
      $('approveBtn').disabled = false;
      $('rejectBtn').disabled = false;

      loadAudit(t.id);
    }

    async function loadAudit(transferId) {
      const base = apiBase();
      const auditList = $('auditList');
      auditList.innerHTML = '<p class="audit-empty">Loading…</p>';
      try {
        const r = await fetch(`${base}/operator/actions/${transferId}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const actions = data.actions || [];
        if (!actions.length) { auditList.innerHTML = '<p class="audit-empty">No actions yet</p>'; return; }
        auditList.innerHTML = actions.map(a => `
          <div class="audit-item">
            <span class="audit-action ${a.action}">${a.action}</span>
            <span class="audit-meta">${a.operator_id} · ${new Date(a.created_at).toLocaleString()}</span>
            ${a.note ? `<span style="color:var(--text-muted);font-size:0.77rem">${a.note}</span>` : ''}
            ${a.contribution_type_override ? `<span style="color:var(--text-muted);font-size:0.77rem">override: ${a.contribution_type_override}</span>` : ''}
          </div>`).join('');
      } catch(e) {
        auditList.innerHTML = `<p class="audit-empty" style="color:var(--fail)">Error: ${e.message}</p>`;
      }
    }

    async function doAction(action) {
      if (!selectedTransfer) return;
      const base = apiBase();
      const feedback = $('actionFeedback');
      const tid = selectedTransfer.id;
      const override = $('contributionOverride').value;
      const body = { transfer_id: tid, operator_id: 'operator-1', note: '' };
      if (action === 'approve' && override) body.contribution_type = override;
      feedback.className = 'action-feedback';
      feedback.textContent = 'Processing…';
      $('approveBtn').disabled = true;
      $('rejectBtn').disabled = true;
      try {
        const r = await fetch(`${base}/operator/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const j = await r.json();
        if (r.ok) {
          feedback.className = 'action-feedback ok';
          feedback.textContent = `${action === 'approve' ? 'Approved' : 'Rejected'} — state: ${j.state}`;
          // Remove from queue after action
          queueItems = queueItems.filter(x => x.id !== tid);
          selectedTransfer = null;
          renderQueue();
          $('detailPlaceholder').style.display = 'flex';
          $('detailContent').style.display = 'none';
          // Reload to get fresh data
          await loadQueue();
        } else {
          feedback.className = 'action-feedback err';
          feedback.textContent = `Error: ${j.error || r.status}`;
          $('approveBtn').disabled = false;
          $('rejectBtn').disabled = false;
        }
      } catch(e) {
        feedback.className = 'action-feedback err';
        feedback.textContent = `Error: ${e.message}`;
        $('approveBtn').disabled = false;
        $('rejectBtn').disabled = false;
      }
    }

    async function checkAPIStatus() {
      const base = apiBase();
      const el = $('apiStatus');
      try {
        const r = await fetch(`${base}/health`);
        el.textContent = r.ok ? 'OK' : 'Err';
        el.className = r.ok ? 'status ok' : 'status err';
      } catch(e) {
        el.textContent = '—';
        el.className = 'status err';
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(() => loadQueue(true), POLL_INTERVAL_MS);
    }
    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function init() {
      $('apiBase').value = location.origin.includes('localhost') ? 'http://localhost:8080' : (location.origin || '');
      $('apiBase').onchange = async () => { await checkAPIStatus(); await loadQueue(); };
      $('refreshBtn').onclick = () => loadQueue();
      $('approveBtn').onclick = () => doAction('approve');
      $('rejectBtn').onclick = () => doAction('reject');
      loadQueue();
      startPolling();

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopPolling();
        else { loadQueue(true); startPolling(); }
      });
    }
    init();
  </script>
</body>
</html>
